<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>割草英雄 v0.3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;touch-action:none;user-select:none;-webkit-user-select:none;font-family:'Microsoft YaHei','PingFang SC',sans-serif}
canvas{display:block;position:absolute;top:0;left:0;width:100%;height:100%}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:20px;overflow-y:auto}
#skillSelect{background:rgba(0,0,0,0.8);z-index:25}
#skillSelect h3{font-size:22px;margin-bottom:16px;color:#ff0}
.skill-btn{width:100%;max-width:340px;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.2);border-radius:12px;padding:12px;margin:6px 0;text-align:left;cursor:pointer;color:#fff;font-size:14px;min-height:65px;display:flex;flex-direction:column;justify-content:center}
.skill-btn:active{background:rgba(255,255,0,0.15);border-color:#ff0}
.skill-btn .sname{font-size:16px;font-weight:bold}
.skill-btn .sdesc{font-size:12px;color:#aaa;margin-top:2px}
.skill-btn .combo-hint{font-size:11px;color:#fd0;margin-top:3px}
#gameOver{background:rgba(0,0,0,0.85);z-index:25}
#gameOver h2{font-size:36px;color:#f33;margin-bottom:16px;text-shadow:0 0 20px #f33}
.stat-line{font-size:16px;margin:4px 0}
.restart{font-size:18px;color:#0f0;margin-top:20px;animation:blink 1.2s infinite}
#skillPanel{background:rgba(0,0,0,0.88);z-index:22;padding:20px}
#skillPanel .close-btn{position:absolute;top:10px;right:16px;font-size:28px;cursor:pointer}
#skillPanel h3{font-size:20px;margin-bottom:12px;color:#ff0;text-align:center}
.panel-section{margin-bottom:14px}
.panel-section h4{font-size:14px;color:#0ff;margin-bottom:4px;border-bottom:1px solid rgba(255,255,255,0.15);padding-bottom:3px}
.skill-row{font-size:13px;padding:2px 0}
.combo-row{font-size:12px;padding:2px 0}
.combo-unlocked{color:#fd0}
.combo-locked{color:#555}
#insuranceConfirm{background:rgba(0,0,0,0.7);z-index:24}
#insuranceConfirm .box{background:#1a1a2e;border:2px solid #f80;border-radius:16px;padding:24px;text-align:center;max-width:280px}
#insuranceConfirm .box p{font-size:16px;margin-bottom:16px}
#insuranceConfirm .box button{font-size:16px;padding:10px 28px;border-radius:8px;border:none;cursor:pointer;margin:0 8px}
#insuranceConfirm .box .yes{background:#f80;color:#fff}
#insuranceConfirm .box .no{background:#333;color:#fff}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<!-- 升级选择 -->
<div id="skillSelect" class="overlay">
<h3>⬆ 升级！选择强化</h3>
<div id="upgradeOptions"></div>
</div>

<!-- 技能面板 -->
<div id="skillPanel" class="overlay">
<div id="panelContent"></div>
</div>

<!-- 保险技确认 -->
<div id="insuranceConfirm" class="overlay">
<div class="box">
<p>🐱 确定要流浪猫猫的抗争吗？<br><small>全屏清除</small></p>
<button class="yes" onclick="activateInsurance()">喵呜！</button>
<button class="no" onclick="closeInsurance()">算了</button>
</div>
</div>

<!-- 游戏结束 -->
<div id="gameOver" class="overlay">
<h2>💀 游戏结束</h2>
<div id="goStats"></div>
<div class="restart">👆 点击重新开始</div>
</div>

<!-- 猫咪图片 -->
<img id="catImg" src="cat_insurance.png" style="display:none">

<!-- 加载脚本 -->
<script src="js/data.js"></script>
<script src="js/audio.js"></script>
<script src="js/engine.js"></script>
<script src="js/entities.js"></script>
<script src="js/skills.js"></script>
<script src="js/ui.js"></script>

<script>
'use strict';

// 猫咪图片引用
const catImg = document.getElementById('catImg');

// ============ 主更新函数 ============
function update(dt) {
    if (GAME.state !== 'playing') return;

    GAME.time += dt;

    // 玩家移动
    const mov = getMovement();
    player.x += mov.x * player.speed * dt;
    player.y += mov.y * player.speed * dt;
    if (mov.x !== 0) player.facing = mov.x > 0 ? 1 : -1;

    // 相机跟随
    updateCam(player, dt);

    // 无敌时间
    if (player.invincible > 0) player.invincible -= dt;

    // 护盾冷却
    if (player.shieldCD > 0) player.shieldCD -= dt;

    // 武器更新
    updateWeapons(dt);
    checkCombos();

    // 敌人更新
    updateEnemies(dt);
    updateSpawning(dt);

    // 子弹更新
    updateProjectiles(dt);

    // 宝石更新
    updateXPGems(dt);

    // 死亡痕迹
    updateDeathTraces(dt);

    // 粒子/文字
    updateParticles(dt);
    updateDmgTexts(dt);
    updateEffects(dt);

    // 清理
    cleanupDead();

    // 大字提示
    if (bigTextTimer > 0) bigTextTimer -= dt;
    if (catEffectTimer > 0) catEffectTimer -= dt;

    // BGM模式
    if (GAME.bossActive) {
        BGM.setMode('boss');
    } else if (enemies.length > 0) {
        BGM.setMode('combat');
    } else if (GAME.time > 20) {
        BGM.setMode('calm');
    }

    // 检查死亡
    if (player.hp <= 0) {
        showGameOver();
    }
}

// 键盘数字键选择升级
window.addEventListener('keydown', (e) => {
    if (GAME.state === 'upgrade') {
        const n = parseInt(e.key);
        if (n >= 1 && n <= 3 && upgradeOptions[n - 1]) {
            upgradeOptions[n - 1].apply();
            closeUpgradeUI();
        }
    }
});
</script>
</body>
</html>
