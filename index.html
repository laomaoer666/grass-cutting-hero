<script>
'use strict';
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H;
function resize(){W=C.width=innerWidth;H=C.height=innerHeight}
resize();addEventListener('resize',resize);

// ==================== 音效引擎 ====================
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new AudioCtx()}
function playSound(type){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  const t=audioCtx.currentTime;
  switch(type){
    case'hit':o.frequency.setValueAtTime(400,t);o.frequency.exponentialRampToValueAtTime(100,t+0.1);g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.1);o.type='square';o.start(t);o.stop(t+0.1);break;
    case'kill':o.frequency.setValueAtTime(600,t);o.frequency.exponentialRampToValueAtTime(200,t+0.2);g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.2);o.type='sawtooth';o.start(t);o.stop(t+0.2);break;
    case'levelup':o.frequency.setValueAtTime(400,t);o.frequency.setValueAtTime(500,t+0.1);o.frequency.setValueAtTime(600,t+0.2);o.frequency.setValueAtTime(800,t+0.3);g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.5);o.type='triangle';o.start(t);o.stop(t+0.5);break;
    case'pickup':o.frequency.setValueAtTime(800,t);o.frequency.exponentialRampToValueAtTime(1200,t+0.08);g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.08);o.type='sine';o.start(t);o.stop(t+0.08);break;
    case'hurt':o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(80,t+0.15);g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.15);o.type='sawtooth';o.start(t);o.stop(t+0.15);break;
    case'sword':o.frequency.setValueAtTime(300,t);o.frequency.exponentialRampToValueAtTime(100,t+0.12);g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.12);o.type='triangle';o.start(t);o.stop(t+0.12);break;
    case'lightning':o.frequency.setValueAtTime(100,t);o.frequency.exponentialRampToValueAtTime(2000,t+0.05);o.frequency.exponentialRampToValueAtTime(50,t+0.2);g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.01,t+0.2);o.type='sawtooth';o.start(t);o.stop(t+0.2);break;
    case'fire':for(let i=0;i<3;i++){const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();o2.connect(g2);g2.connect(audioCtx.destination);o2.frequency.setValueAtTime(100+i*50,t);o2.frequency.exponentialRampToValueAtTime(50,t+0.3);g2.gain.setValueAtTime(0.08,t);g2.gain.exponentialRampToValueAtTime(0.01,t+0.3);o2.type='sawtooth';o2.start(t+i*0.05);o2.stop(t+0.3+i*0.05)}break;
    case'boss':o.frequency.setValueAtTime(80,t);o.frequency.setValueAtTime(60,t+0.5);g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.01,t+1);o.type='sawtooth';o.start(t);o.stop(t+1);break;
  }
}

// ==================== 工具 ====================
const PI=Math.PI,PI2=PI*2;
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const ang=(a,b)=>Math.atan2(b.y-a.y,b.x-a.x);
const rnd=(a,b)=>Math.random()*(b-a)+a;
const rndI=(a,b)=>Math.floor(rnd(a,b+1));
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

// ==================== 输入 ====================
const keys={};
addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if('wasd'.includes(e.key.toLowerCase()))e.preventDefault()});
addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

const mDir={x:0,y:0};
let touchId=null,touchStart={x:0,y:0};
C.addEventListener('touchstart',e=>{
  initAudio();
  const t=e.changedTouches[0];
  touchId=t.identifier;touchStart={x:t.clientX,y:t.clientY};
  mDir.x=0;mDir.y=0;
},{passive:false});
C.addEventListener('touchmove',e=>{
  for(const t of e.changedTouches){
    if(t.identifier===touchId){
      const dx=t.clientX-touchStart.x,dy=t.clientY-touchStart.y;
      const d=Math.hypot(dx,dy);
      if(d>15){mDir.x=dx/d;mDir.y=dy/d}
      else{mDir.x=0;mDir.y=0}
    }
  }
  e.preventDefault();
},{passive:false});
C.addEventListener('touchend',e=>{
  for(const t of e.changedTouches){
    if(t.identifier===touchId){touchId=null;mDir.x=0;mDir.y=0}
  }
});

addEventListener('mousedown',initAudio);
addEventListener('keydown',initAudio);

// ==================== BOSS类型注册表 ====================
// 每个BOSS有独立的属性、攻击模式、视觉风格
// 后续细化时在这里加新类型即可
const BOSS_TYPES={
  // 默认BOSS（当前通用）
  default:{name:'暴君',color:'#f33',hp:800,dmg:45,size:32,speed:22,
    attacks:['fan','charge'],
    desc:'扇形弹幕+冲锋'},
  // 以下是预留模板，后续填充
  // tank:{name:'铁壁将军',color:'#f80',hp:1500,dmg:30,size:40,speed:15,
  //   attacks:['shield','summon'],
  //   desc:'召唤小怪+护盾'},
  // assassin:{name:'暗影刺客',color:'#a0f',hp:500,dmg:60,size:25,speed:60,
  //   attacks:['teleport','backstab'],
  //   desc:'瞬移背刺'},
  // swarm:{name:'虫巢母后',color:'#6a3',hp:1200,dmg:20,size:35,speed:18,
  //   attacks:['spawn','poison'],
  //   desc:'持续产卵+毒雾'},
};
// 根据波次选择BOSS类型
function getBossType(wave){
  const types=Object.keys(BOSS_TYPES);
  // 第一个BOSS always default，后续循环
  const idx=Math.floor((wave/5-1))%types.length;
  return BOSS_TYPES[types[idx]]||BOSS_TYPES.default;
}

// ==================== BOSS弹幕 ====================
const bossBullets=[];
const traps=[];
function spawnBossBullet(x,y,angle,speed,dmg,color,size){
  bossBullets.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,dmg,color:color||'#f44',size:size||6,life:4});
}
function spawnTrap(x,y){
  // 陷阱：地面红色区域，持续一段时间，碰到就受伤
  traps.push({x,y,radius:rnd(25,40),life:8+Math.random()*4,dps:20+G.wave*2,
    pulsePhase:Math.random()*PI2});
}

// ==================== 相机 ====================
const cam={x:0,y:0,shake:0};
function addShake(amount){cam.shake=Math.min(cam.shake+amount*0.5,8)}

// ==================== 粒子池 ====================
const particles=[];
function spawnP(x,y,color,count,speed,life,size){
  for(let i=0;i<count;i++){
    const a=Math.random()*PI2,s=rnd(0.5,1)*speed;
    if(particles.length<200)particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life,maxLife:life,size:rnd(size*0.5,size),color});
  }
}

// ==================== 伤害文字 ====================
const dmgTexts=[];
function spawnDmg(x,y,text,color='#fff'){
  if(dmgTexts.length<50)dmgTexts.push({x:x+rnd(-8,8),y,text:String(text),color,life:0.7,vy:-2.5});
}

// ==================== 经验宝石 ====================
const gems=[];
function spawnGem(x,y,value){
  gems.push({x,y,value,size:value>=25?10:value>=10?7:5,
    color:value>=25?'#f0f':value>=10?'#0ff':'#0f8',
    life:25,a:Math.random()*PI2});
}

// ==================== 敌人 ====================
const enemies=[];
const ENEMY_TYPES={
  slime:{hp:25,speed:45,dmg:8,size:13,color:'#3a3',xp:3,shape:'circle'},
  bat:{hp:15,speed:90,dmg:6,size:9,color:'#a3a',xp:3,shape:'tri'},
  skeleton:{hp:60,speed:38,dmg:15,size:15,color:'#bbb',xp:8,shape:'diamond'},
  ogre:{hp:180,speed:28,dmg:28,size:22,color:'#a63',xp:25,shape:'circle'},
  boss:{hp:800,speed:22,dmg:45,size:32,color:'#f33',xp:120,shape:'star'},
  ghost:{hp:35,speed:65,dmg:12,size:11,color:'#88f',xp:6,shape:'circle'},
  worm:{hp:45,speed:30,dmg:10,size:10,color:'#6a3',xp:5,shape:'circle'},
  acid:{hp:40,speed:50,dmg:10,size:12,color:'#6f0',xp:8,shape:'circle',acidOnDeath:true},
  tank:{hp:400,speed:18,dmg:35,size:28,color:'#864',xp:30,shape:'diamond'},
  splitter:{hp:55,speed:55,dmg:12,size:15,color:'#c6f',xp:8,shape:'circle',children:3},
};
function spawnEnemy(type,x,y,hpMult=1){
  const t=ENEMY_TYPES[type];
  const e={type,x,y,...t,hp:t.hp*hpMult,maxHp:t.hp*hpMult,dmg:t.dmg*(1+(hpMult-1)*0.5),
    hitFlash:0,burning:0,burnDmg:0,slow:0,slowTimer:0,dead:false,
    acidOnDeath:t.acidOnDeath||false,children:t.children||0,
    bossAtkCd:type==='boss'?1.5:0,bossPhase:0,bossChargeCd:type==='boss'?8:0,bossCharging:false,bossChargeDir:0};
  enemies.push(e);
}

// ==================== 玩家 ====================
const CHARACTERS={
  slave:{id:'slave',name:'社畜',emoji:'💻',color:'#6a8',speedMul:1.10,hpMul:1.0,atkMul:1.0,xpMul:1.0,desc:'格子衫+黑眼圈+咖啡杯',stats:'移速 +10%'},
  wang:{id:'wang',name:'老王',emoji:'👴',color:'#da8',speedMul:1.0,hpMul:1.20,atkMul:0.95,xpMul:1.0,desc:'秃顶+白背心+蒲扇',stats:'血量 +20% | 攻速 -5%'},
  intern:{id:'intern',name:'实习生',emoji:'📚',color:'#8af',speedMul:1.0,hpMul:0.90,atkMul:1.0,xpMul:1.15,desc:'大眼镜+马尾+文件夹',stats:'经验 +15% | 血量 -10%'},
};
let selectedChar='slave';
const player={
  x:0,y:0,speed:160,hp:100,maxHp:100,
  xp:0,level:1,xpToNext:15,
  magnet:90,armor:0,
  weapons:[{type:'sword',lv:1,cd:0}],
  orbAngle:0,invincible:0,
  trail:[],
};

// ==================== 武器定义 ====================
const WEAPONS={
  // ⚔ 单体高伤 — BOSS杀手，攻速慢但一刀一个
  sword:{name:'斩杀刀',icon:'⚔',desc:'高伤单体，斩杀低血敌人',color:'#f44',
    baseDmg:35,baseCd:0.9,baseRange:85,
    attack(p,ens,lvl){
      if(!ens.length)return;
      let nd=null,md=1e9;
      for(const e of ens){const d=dist(p,e);if(d<md){md=d;nd=e}}
      const range=85+lvl*12,dmg=35+lvl*12,a=ang(p,nd);
      playSound('sword');
      for(const e of ens){
        if(dist(p,e)>range)continue;
        let da=Math.abs(ang(p,e)-a);if(da>PI)da=PI2-da;
        if(da<0.6){
          // 斩杀：血量低于30%直接秒杀
          const finalDmg=(e.hp/e.maxHp<0.3)?e.hp:dmg;
          e.hp-=finalDmg;e.hitFlash=0.08;
          spawnDmg(e.x,e.y-e.size,Math.round(finalDmg),e.hp<=0?'#f00':'#f44');
          if(e.hp<=0)killEnemy(e)
        }
      }
      G.swordFx.push({x:p.x,y:p.y,a,range,life:0.15,max:0.15});
      addShake(3);
    }},
  // 🔮 持续AOE — 围着你转，清小怪利器
  orb:{name:'旋风斩',icon:'🌀',desc:'持续旋转切割周围敌人',color:'#0ff',
    baseDmg:8,baseCd:0,baseRange:70,
    update(p,ens,lvl,dt){
      const cnt=2+Math.floor(lvl/2),r=70+lvl*8,dmg=8+lvl*5;
      p.orbAngle=(p.orbAngle||0)+dt*3.5;
      for(let i=0;i<cnt;i++){
        const a=p.orbAngle+(PI2/cnt)*i;
        const ox=p.x+Math.cos(a)*r,oy=p.y+Math.sin(a)*r;
        for(const e of ens){if(!e.dead&&dist({x:ox,y:oy},e)<20){e.hp-=dmg*dt*5;e.hitFlash=0.02}}
      }
    }},
  // ⚡ 弹射群伤 — 打一个弹一串，怪越多越爽
  lightning:{name:'连锁闪电',icon:'⚡',desc:'击中敌人后弹射到附近目标',color:'#ff0',
    baseDmg:25,baseCd:1.2,baseRange:250,
    attack(p,ens,lvl){
      const range=250+lvl*25,ts=ens.filter(e=>dist(p,e)<range&&!e.dead);
      if(!ts.length)return;
      playSound('lightning');
      const dmg=25+lvl*8,bounces=2+lvl;
      // 找最近的打第一下
      let target=ts.reduce((a,b)=>dist(p,a)<dist(p,b)?a:b);
      const hit=new Set();
      for(let i=0;i<Math.min(bounces,ts.length);i++){
        if(!target||target.dead)break;
        target.hp-=dmg;target.hitFlash=0.1;
        spawnDmg(target.x,target.y-target.size,dmg,'#ff0');
        G.lightFx.push({x:target.x,y:target.y,life:0.25});
        if(target.hp<=0)killEnemy(target);
        hit.add(target);
        // 弹到最近的未命中目标
        let next=null,nd=200; // 弹射距离200
        for(const e of ts){
          if(hit.has(e)||e.dead)continue;
          const d=dist(target,e);
          if(d<nd){nd=d;next=e}
        }
        target=next;
      }
      addShake(2);
    }},
  // 🔥 范围持续 — 点燃烧血，越打越疼
  fire:{name:'地狱火',icon:'🔥',desc:'范围灼烧，持续掉血',color:'#f80',
    baseDmg:12,baseCd:1.5,baseRange:140,
    attack(p,ens,lvl){
      const range=140+lvl*18,dmg=12+lvl*4;
      playSound('fire');
      for(const e of ens){
        if(dist(p,e)<range){
          e.hp-=dmg;e.hitFlash=0.08;
          // 强力灼烧：6秒持续伤害
          e.burning=6;e.burnDmg=8+lvl*3;
          spawnDmg(e.x,e.y-e.size,dmg,'#f80');
          if(e.hp<=0)killEnemy(e)
        }
      }
      G.fireFx.push({x:p.x,y:p.y,range,life:0.35,max:0.35});
      addShake(2);
    }},
  // ❄ 控制减速 — 不靠伤害吃饭，靠控场
  ice:{name:'绝对零度',icon:'❄',desc:'大范围冰冻减速，怪物变慢60%',color:'#8cf',
    baseDmg:8,baseCd:2.0,baseRange:120,
    attack(p,ens,lvl){
      const range=120+lvl*20,dmg=8+lvl*3;
      for(const e of ens){
        if(dist(p,e)<range){
          e.hp-=dmg;e.hitFlash=0.08;
          // 强力减速60%，持续3秒+
          e.slow=0.6;e.slowTimer=3+lvl*0.8;
          spawnDmg(e.x,e.y-e.size,dmg,'#8cf');
          if(e.hp<=0)killEnemy(e)
        }
      }
      G.iceFx.push({x:p.x,y:p.y,range,life:0.4,max:0.4});
      addShake(2);
    }},
};

// ==================== 组合技系统 ====================
// 当任意技能Lv5+另一个技能Lv1+触发
const COMBOS={
  'sword+lightning':{name:'⚡⚔ 雷霆斩杀',desc:'刀气附带连锁闪电，击中3个目标',
    trigger(combo,dt){
      combo.cd-=dt;if(combo.cd>0)return;combo.cd=2.5;
      const ens=enemies.filter(e=>!e.dead&&dist(player,e)<200);
      if(!ens.length)return;
      // 找最近的斩3下，每下弹射
      const target=ens.reduce((a,b)=>dist(player,a)<dist(player,b)?a:b);
      const dmg=60+combo.lv*15;
      target.hp-=dmg;spawnDmg(target.x,target.y,dmg,'#ff0');
      G.lightFx.push({x:target.x,y:target.y,life:0.3});
      if(target.hp<=0)killEnemy(target);
      // 弹射2个
      const others=ens.filter(e=>e!==target).sort((a,b)=>dist(target,a)-dist(target,b));
      for(let i=0;i<Math.min(2,others.length);i++){
        others[i].hp-=dmg*0.6;others[i].hitFlash=0.1;
        spawnDmg(others[i].x,others[i].y,dmg*0.6,'#ff8');
        G.lightFx.push({x:others[i].x,y:others[i].y,life:0.25});
        if(others[i].hp<=0)killEnemy(others[i]);
      }
      addShake(3);
    }},
  'fire+ice':{name:'🔥❄ 蒸汽爆炸',desc:'灼烧+冰冻的敌人引发蒸汽爆破',
    trigger(combo,dt){
      combo.cd-=dt;if(combo.cd>0)return;combo.cd=3;
      const range=160+combo.lv*20,dmg=50+combo.lv*20;
      for(const e of enemies){
        if(!e.dead&&e.burning>0&&e.slowTimer>0&&dist(player,e)<range){
          e.hp-=dmg;e.hitFlash=0.15;
          spawnP(e.x,e.y,'#fff',10,5,0.5,4);
          spawnDmg(e.x,e.y,dmg,'#fff');
          if(e.hp<=0)killEnemy(e);
        }
      }
      // 范围蒸汽伤害
      for(const e of enemies){
        if(!e.dead&&dist(player,e)<range*0.7){
          e.hp-=dmg*0.3;e.hitFlash=0.05;
          if(e.hp<=0)killEnemy(e);
        }
      }
      addShake(4);
    }},
  'lightning+orb':{name:'⚡🌀 电磁风暴',desc:'旋风斩附带闪电链，持续电击周围',
    trigger(combo,dt){
      combo.cd-=dt;if(combo.cd>0)return;combo.cd=1.8;
      const range=120+combo.lv*15,dmg=30+combo.lv*10;
      const ts=enemies.filter(e=>!e.dead&&dist(player,e)<range);
      for(let i=0;i<Math.min(3+combo.lv,ts.length);i++){
        const t=ts[i];
        t.hp-=dmg;t.hitFlash=0.08;
        G.lightFx.push({x:t.x,y:t.y,life:0.2});
        spawnDmg(t.x,t.y,dmg,'#0ff');
        if(t.hp<=0)killEnemy(t);
      }
    }},
  'sword+fire':{name:'⚔🔥 烈焰斩',desc:'刀气点燃敌人，范围爆炸',
    trigger(combo,dt){
      combo.cd-=dt;if(combo.cd>0)return;combo.cd=2;
      const range=150+combo.lv*15,dmg=40+combo.lv*12;
      const ts=enemies.filter(e=>!e.dead&&dist(player,e)<range);
      if(!ts.length)return;
      const t=ts.reduce((a,b)=>dist(player,a)<dist(player,b)?a:b);
      t.hp-=dmg;t.burning=4;t.burnDmg=15+combo.lv*5;
      spawnDmg(t.x,t.y,dmg,'#f44');
      G.fireFx.push({x:t.x,y:t.y,range:60,life:0.3,max:0.3});
      // 爆炸伤害周围
      for(const e of enemies){
        if(e!==t&&!e.dead&&dist(t,e)<60){
          e.hp-=dmg*0.5;e.burning=3;e.burnDmg=10;
          if(e.hp<=0)killEnemy(e);
        }
      }
      if(t.hp<=0)killEnemy(t);
      addShake(3);
    }},
  'orb+ice':{name:'🌀❄ 冰霜旋风',desc:'旋风斩变成冰刃，大范围减速+伤害',
    trigger(combo,dt){
      combo.cd-=dt;if(combo.cd>0)return;combo.cd=2.2;
      const range=140+combo.lv*18,dmg=25+combo.lv*8;
      for(const e of enemies){
        if(!e.dead&&dist(player,e)<range){
          e.hp-=dmg;e.slow=0.5;e.slowTimer=3;e.hitFlash=0.06;
          spawnDmg(e.x,e.y,dmg,'#8cf');
          if(e.hp<=0)killEnemy(e);
        }
      }
      addShake(2);
    }},
};

// 检查并触发组合技
function checkCombos(){
  const p=player;
  if(p.combos)return; // 已有组合
  const ws=p.weapons;
  for(let i=0;i<ws.length;i++){
    for(let j=0;j<ws.length;j++){
      if(i===j)continue;
      if(ws[i].lv>=5&&ws[j].lv>=1){
        const key1=ws[i].type+'+'+ws[j].type;
        const key2=ws[j].type+'+'+ws[i].type;
        const comboDef=COMBOS[key1]||COMBOS[key2];
        if(comboDef&&!ws[i].combo){
          ws[i].combo={...comboDef,lv:Math.min(ws[i].lv,ws[j].lv),cd:0};
          return;
        }
      }
    }
  }
}
const deathTraces=[];
function killEnemy(e){
  if(e.dead)return;
  e.dead=true;
  G.kills++;
  playSound('kill');
  spawnP(e.x,e.y,e.color,6,3,0.4,4);
  // 吸血
  if(player.healOnKill>0)player.hp=Math.min(player.hp+player.healOnKill,player.maxHp);
  // 掉落宝石
  const v=e.xp>=25?25:e.xp>=10?10:3;
  const cnt=Math.ceil(e.xp/v);
  for(let i=0;i<cnt;i++)spawnGem(e.x+rnd(-12,12),e.y+rnd(-12,12),v);
  if(e.type==='boss'){
    addShake(10);
    spawnP(e.x,e.y,'#f44',30,6,0.8,6);
    G.bossKills++;
    G.spawnMul*=2;
    // 第二个BOSS死后开始生成陷阱
    if(G.bossKills>=2&&!G.trapsEnabled){
      G.trapsEnabled=true;
    }
  }
  // 酸液池
  if(e.acidOnDeath){
    deathTraces.push({x:e.x,y:e.y,radius:35,life:4,maxLife:4,color:'#2a0',dps:15});
  }
  // 分裂
  if(e.children>0){
    for(let i=0;i<e.children;i++){
      const a=PI2/e.children*i+rnd(0,1);
      const d=e.size+5;
      const child=spawnEnemy('slime',e.x+Math.cos(a)*d,e.y+Math.sin(a)*d,0.4);
    }
  }
}

// ==================== 升级系统 ====================
function showUpgrades(){
  G.state='upgrade';
  const all=[];
  const p=player;
  // 已有武器升级
  for(const w of p.weapons){
    if(w.lv<8){
      const d=WEAPONS[w.type];
      all.push({name:`${d.icon} ${d.name} Lv${w.lv+1}`,desc:d.desc+'（强化）',apply:()=>{w.lv++;checkCombos()}});
    }
  }
  // 新武器
  const owned=p.weapons.map(w=>w.type);
  for(const[k,d]of Object.entries(WEAPONS)){
    if(!owned.includes(k)&&owned.length<4){
      all.push({name:`✨ ${d.icon} ${d.name}`,desc:d.desc,apply:()=>p.weapons.push({type:k,lv:1,cd:0})});
    }
  }
  // 属性升级
  all.push({name:'❤ 吸血回复',desc:'每次击杀回复5HP',apply:()=>{p.healOnKill=(p.healOnKill||0)+5}});
  all.push({name:'🏃 移速+15%',desc:`移动更快 (当前${Math.round(p.speed)})`,apply:()=>p.speed*=1.15});
  all.push({name:'🧲 磁铁+40',desc:`吸取范围+40 (当前${Math.round(p.magnet)})`,apply:()=>p.magnet+=40});
  all.push({name:'💥 暴击率+12%',desc:`暴击概率+12% (当前${Math.round((p.critChance||0)*100)}%)`,apply:()=>{p.critChance=(p.critChance||0)+0.12}});
  all.push({name:'💪 全伤害+15%',desc:'所有武器伤害+15%',apply:()=>{p.dmgMul=(p.dmgMul||1)*1.15}});
  all.push({name:'⏱ 攻速+10%',desc:'所有武器冷却-10%',apply:()=>{p.cdMul=(p.cdMul||1)*0.9}});
  
  // 随机选3个
  G.upgradeOpts=[];
  const shuf=all.sort(()=>Math.random()-0.5).slice(0,3);
  G.upgradeOpts=shuf;
}

const G={
  state:'menu',time:0,kills:0,
  spawnTimer:0,wave:1,waveTimer:0,
  swordFx:[],lightFx:[],fireFx:[],iceFx:[],
  upgradeOpts:[],
  combos:0,comboTimer:0,
  start(){
    initAudio();
    const ch=CHARACTERS[selectedChar];
    player.x=0;player.y=0;
    player.maxHp=Math.round(100*ch.hpMul);player.hp=player.maxHp;
    player.xp=0;player.level=1;player.xpToNext=15;
    player.speed=160*ch.speedMul;player.magnet=90;player.armor=0;
    player.healOnKill=0;player.critChance=0;player.dmgMul=1;player.cdMul=1;
    player.weapons=[{type:'sword',lv:1,cd:0}];player.invincible=0;
    enemies.length=0;gems.length=0;particles.length=0;dmgTexts.length=0;bossBullets.length=0;traps.length=0;
    this.swordFx=[];this.lightFx=[];this.fireFx=[];this.iceFx=[];

    this.combos=0;this.comboTimer=0;

// ==================== 生成敌人 ====================
// 根据波次构建怪物池
function getMonsterPool(w){
  const pool=['slime']; // 基础怪
  if(w>=1)pool.push('bat');      // 快速小怪
  if(w>=2)pool.push('skeleton'); // 中等怪
  if(w>=3)pool.push('ghost','worm'); // 隐形+蠕虫
  if(w>=4)pool.push('acid');     // 酸液怪
  if(w>=5)pool.push('splitter','ogre'); // 分裂+肉搏
  if(w>=6)pool.push('tank');     // 肉盾
  // 后期增加精英比例
  if(w>=8){pool.push('ogre','tank','splitter')} // 多加一轮权重
  if(w>=10){pool.push('acid','ghost')} // 更多精英
  return pool;
}

function spawnWave(dt){
  // 波次计时器每帧都累加（修复：之前只在出怪时才加dt导致波次不涨）
  G.waveTimer+=dt;
  if(G.waveTimer>18){
    G.waveTimer=0;G.wave++;
    if(G.wave%5===0){
      playSound('boss');
      const a=Math.random()*PI2,d=rnd(350,450);
      const bt=getBossType(G.wave);
      const hpMult=(1+G.wave*0.25)*(1+G.kills*0.0008);
      const bx=player.x+Math.cos(a)*d,by=player.y+Math.sin(a)*d;
      const e=spawnEnemy('boss',bx,by,hpMult);
      const boss=enemies[enemies.length-1];
      boss.bossName=bt.name;boss.color=bt.color;
      boss.hp=bt.hp*hpMult;boss.maxHp=bt.hp*hpMult;
      boss.dmg=bt.dmg*(1+(hpMult-1)*0.3);
      boss.size=bt.size;boss.speed=bt.speed;
      boss.attacks=bt.attacks;
    }
  }
  G.spawnTimer-=dt;
  if(G.spawnTimer>0)return;
  const w=G.wave;
  G.spawnTimer=Math.max(0.15,0.8-w*0.05);
  const cnt=Math.min(40,6+Math.floor(w*2))*(G.spawnMul||1);
  const hpMult=(1+w*0.25)*(1+G.kills*0.0008);
  const pool=getMonsterPool(w);
  
  for(let i=0;i<cnt;i++){
    const a=Math.random()*PI2,d=rnd(400,550);
    const x=player.x+Math.cos(a)*d,y=player.y+Math.sin(a)*d;
    // 从池中随机选，保证多样性
    const type=pool[rndI(0,pool.length-1)];
    spawnEnemy(type,x,y,hpMult);
  }
  
  // 陷阱生成（第二个BOSS死后）
  if(G.trapsEnabled){
    G._trapTimer=(G._trapTimer||0)+dt;
    if(G._trapTimer>3){G._trapTimer=0;
      // 在玩家附近随机生成陷阱
      const ta=Math.random()*PI2,td=rnd(100,300);
      spawnTrap(player.x+Math.cos(ta)*td,player.y+Math.sin(ta)*td);
    }
  }
}

// ==================== 更新 ====================
function update(dt){
  if(G.state!=='play')return;
  
  G.time+=dt;
  const p=player;
  p.invincible=Math.max(0,p.invincible-dt);
  
  // 移动
  let dx=0,dy=0;
  if(keys.w||keys.arrowup)dy=-1;if(keys.s||keys.arrowdown)dy=1;
  if(keys.a||keys.arrowleft)dx=-1;if(keys.d||keys.arrowright)dx=1;
  dx+=mDir.x;dy+=mDir.y;
  const dl=Math.hypot(dx,dy);
  if(dl>0){p.x+=dx/dl*p.speed*dt;p.y+=dy/dl*p.speed*dt;p.trail.push({x:p.x,y:p.y,t:0.15})}
  
  // 拖尾
  for(const t of p.trail)t.t-=dt;
  p.trail=p.trail.filter(t=>t.t>0);
  
  // 相机
  cam.x+=(p.x-W/2-cam.x)*0.12;
  cam.y+=(p.y-H/2-cam.y)*0.12;
  if(cam.shake>0){cam.shake*=0.9;if(cam.shake<0.1)cam.shake=0}
  
  // 武器
  for(const w of p.weapons){
    const d=WEAPONS[w.type];
    if(d.update)d.update(p,enemies,w.lv,dt);
    if(d.attack){w.cd-=dt;if(w.cd<=0){d.attack(p,enemies,w.lv);w.cd=Math.max(0.15,d.baseCd*Math.pow(0.92,w.lv-1)*(p.cdMul||1))}}
    // 组合技触发
    if(w.combo)w.combo.trigger(w.combo,dt);
  }
  
  // 敌人
  for(const e of enemies){
    if(e.dead)continue;
    e.hitFlash=Math.max(0,e.hitFlash-dt);
    if(e.burning>0){e.burning-=dt;e.hp-=e.burnDmg*dt;if(Math.random()<0.25)spawnP(e.x+rnd(-4,4),e.y+rnd(-4,4),'#f80',1,1.5,0.25,3)}
    if(e.slowTimer>0){e.slowTimer-=dt;if(e.slowTimer<=0)e.slow=0}
    const spd=e.speed*(1-e.slow);
    const a=ang(e,p);
    // BOSS特殊AI（数据驱动，根据attacks数组决定攻击模式）
    if(e.type==='boss'&&!e.dead){
      const atks=e.attacks||['fan','charge'];
      // 扇形弹幕
      if(atks.includes('fan')){
        e.bossAtkCd-=dt;
        if(e.bossAtkCd<=0){
          e.bossPhase=(e.bossPhase||0)+1;
          const baseA=ang(e,p);
          const bulletCount=5+Math.floor(G.wave/5)*2;
          const spread=0.8;
          for(let i=0;i<bulletCount;i++){
            const ba=baseA-spread/2+spread/(bulletCount-1)*i;
            spawnBossBullet(e.x,e.y,ba,180,e.dmg*0.5,e.color,6);
          }
          e.bossAtkCd=Math.max(0.8,1.5-G.wave*0.05);
          addShake(2);
        }
      }
      // 冲锋攻击
      if(atks.includes('charge')){
        e.bossChargeCd-=dt;
        if(e.bossChargeCd<=0&&!e.bossCharging){
          e.bossCharging=true;
          e.bossChargeDir=ang(e,p);
          e.bossChargeCd=Math.max(4,8-G.wave*0.2);
          playSound('boss');
        }
        if(e.bossCharging){
          const chargeSpd=400;
          e.x+=Math.cos(e.bossChargeDir)*chargeSpd*dt;
          e.y+=Math.sin(e.bossChargeDir)*chargeSpd*dt;
          if(!e._chargeTime)e._chargeTime=0;
          e._chargeTime+=dt;
          if(e._chargeTime>0.6){e.bossCharging=false;e._chargeTime=0;addShake(5)}
          if(p.invincible<=0&&dist(p,e)<e.size+20){
            p.hp-=e.dmg*dt*3;
            spawnP(p.x,p.y,e.color,4,3,0.3,3);
          }
        }
      }
      // 预留：护盾、召唤、瞬移、毒雾等
      // if(atks.includes('shield')){...}
      // if(atks.includes('summon')){...}
      // if(atks.includes('teleport')){...}
      // if(atks.includes('poison')){...}
      if(!e.bossCharging){
        const a=ang(e,p);const spd=e.speed*(1-e.slow);
        e.x+=Math.cos(a)*spd*dt;e.y+=Math.sin(a)*spd*dt;
      }
    }else{
      e.x+=Math.cos(a)*spd*dt;e.y+=Math.sin(a)*spd*dt;
    }
    // 碰撞
    if(p.invincible<=0&&dist(p,e)<e.size+14){
      const dmg=Math.max(1,e.dmg*dt*1.5-p.armor*0.3);
      p.hp-=dmg;
      if(Math.random()<0.1){spawnDmg(p.x,p.y-20,Math.round(dmg),'#f44');playSound('hurt');addShake(3)}
      if(p.hp<=0){G.gameOver();return}
    }
  }
  // 清理远处敌人
  for(let i=enemies.length-1;i>=0;i--){if(enemies[i].dead||dist(player,enemies[i])>1000)enemies.splice(i,1)}
  
  // 酸液池更新
  for(let i=deathTraces.length-1;i>=0;i--){
    const t=deathTraces[i];
    t.life-=dt;
    if(t.life<=0){deathTraces.splice(i,1);continue}
    if(dist(p,t)<t.radius){
      p.hp-=t.dps*dt;
      if(p.hp<=0){G.gameOver();return}
    }
  }
  
  // BOSS子弹更新
  for(let i=bossBullets.length-1;i>=0;i--){
    const b=bossBullets[i];
    b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;
    if(b.life<=0||dist(p,b)>800){bossBullets.splice(i,1);continue}
    if(p.invincible<=0&&dist(p,b)<b.size+14){
      p.hp-=b.dmg;
      spawnDmg(p.x,p.y-20,Math.round(b.dmg),'#f44');
      playSound('hurt');addShake(3);
      bossBullets.splice(i,1);
      if(p.hp<=0){G.gameOver();return}
    }
  }
  
  // 陷阱更新
  for(let i=traps.length-1;i>=0;i--){
    const t=traps[i];
    t.life-=dt;
    if(t.life<=0){traps.splice(i,1);continue}
    // 碰到就受伤（持续伤害）
    if(dist(p,t)<t.radius+14){
      p.hp-=t.dps*dt;
      if(Math.random()<0.15){spawnDmg(p.x,p.y-15,Math.round(t.dps*dt),'#f22');playSound('hurt')}
      if(p.hp<=0){G.gameOver();return}
    }
  }
  
  // 宝石
  for(const g of gems){
    g.life-=dt;g.a+=dt*3;
    const d=dist(p,g);
    if(d<p.magnet){const a=ang(g,p);g.x+=Math.cos(a)*350*dt;g.y+=Math.sin(a)*350*dt}
    if(dist(p,g)<18){
      g.collected=true;p.xp+=g.value;
      playSound('pickup');
      G.combos++;G.comboTimer=1;
      while(p.xp>=p.xpToNext){
        p.xp-=p.xpToNext;p.level++;
        p.xpToNext=Math.floor(20*Math.pow(1.4,p.level-1));
        p.maxHp+=8;p.hp=Math.min(p.hp+30,p.maxHp);
        playSound('levelup');
        showUpgrades();
      }
    }
  }
  for(let i=gems.length-1;i>=0;i--){if(gems[i].collected||gems[i].life<=0)gems.splice(i,1)}
  
  // 连击
  if(G.comboTimer>0){G.comboTimer-=dt;if(G.comboTimer<=0)G.combos=0}
  
  // 粒子
  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.life-=dt}
  for(let i=particles.length-1;i>=0;i--){if(particles[i].life<=0)particles.splice(i,1)}
  
  // 伤害文字
  for(const d of dmgTexts){d.y+=d.vy;d.life-=dt}
  for(let i=dmgTexts.length-1;i>=0;i--){if(dmgTexts[i].life<=0)dmgTexts.splice(i,1)}
  
  // 特效
  for(const f of G.swordFx)f.life-=dt;G.swordFx=G.swordFx.filter(f=>f.life>0);
  for(const f of G.lightFx)f.life-=dt;G.lightFx=G.lightFx.filter(f=>f.life>0);
  for(const f of G.fireFx)f.life-=dt;G.fireFx=G.fireFx.filter(f=>f.life>0);
  for(const f of G.iceFx)f.life-=dt;G.iceFx=G.iceFx.filter(f=>f.life>0);
  
  spawnWave(dt);
}

// ==================== 渲染 ====================
function drawGrid(){
  const gs=80,sx=-(cam.x%gs),sy=-(cam.y%gs);
  X.strokeStyle='rgba(255,255,255,0.025)';X.lineWidth=1;
  for(let x=sx;x<W;x+=gs*2){X.beginPath();X.moveTo(x,0);X.lineTo(x,H);X.stroke()}
  for(let y=sy;y<H;y+=gs*2){X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke()}
}

function drawPlayer(){
  const p=player,sx=p.x-cam.x,sy=p.y-cam.y;
  const ch=CHARACTERS[selectedChar];
  const col=ch?ch.color:'#0f8';
  // 拖尾
  for(const t of p.trail){
    const a=t.t/0.15;
    X.globalAlpha=a*0.3;X.fillStyle=col;
    X.beginPath();X.arc(t.x-cam.x,t.y-cam.y,14*a,0,PI2);X.fill();
  }
  X.globalAlpha=1;
  
  // 身体（根据角色不同外观）
  const cid=selectedChar;
  X.fillStyle=col;X.shadowColor=col;
  
  if(cid==='wang'){
    // 老王：圆胖身体+秃顶+白背心
    X.beginPath();X.ellipse(sx,sy+2,12,16,0,0,PI2);X.fill();X.shadowBlur=0;
    // 秃顶头
    X.fillStyle='#ddb88c';X.beginPath();X.arc(sx,sy-14,11,0,PI2);X.fill();
    // 白背心
    X.fillStyle='#eee';X.fillRect(sx-7,sy-3,14,12);
    // 蒲扇
    X.fillStyle='#a86';X.beginPath();X.ellipse(sx+16,sy+4,5,8,0.3,0,PI2);X.fill();
  }else if(cid==='intern'){
    // 实习生：瘦小身体+大书包+帆布鞋
    X.beginPath();X.roundRect(sx-6,sy-4,12,15,3);X.fill();X.shadowBlur=0;
    // 头（略小）
    X.fillStyle=col;X.beginPath();X.arc(sx,sy-12,8,0,PI2);X.fill();
    // 书包
    X.fillStyle='#666';X.fillRect(sx-10,sy-2,6,10);
    // 帆布鞋
    X.fillStyle='#fff';X.fillRect(sx-6,sy+11,5,3);X.fillRect(sx+1,sy+11,5,3);
  }else{
    // 社畜：格子衫+眼镜+咖啡杯
    X.beginPath();X.roundRect(sx-8,sy-4,16,18,4);X.fill();X.shadowBlur=0;
    // 头
    X.fillStyle=col;X.beginPath();X.arc(sx,sy-12,10,0,PI2);X.fill();
    // 格子衫纹理
    X.strokeStyle='rgba(0,0,0,0.2)';X.lineWidth=1;
    for(let gx=sx-6;gx<sx+8;gx+=5){X.beginPath();X.moveTo(gx,sy-3);X.lineTo(gx,sy+14);X.stroke()}
    for(let gy=sy-2;gy<sy+14;gy+=5){X.beginPath();X.moveTo(sx-7,gy);X.lineTo(sx+8,gy);X.stroke()}
    // 咖啡杯
    X.fillStyle='#854';X.fillRect(sx+12,sy+2,5,8);X.fillRect(sx+13,sy,3,3);
    X.fillStyle='#f80';X.fillRect(sx+13,sy+3,3,3);
  }
  
  // 眼睛（通用）
  const lookX=mDir.x||0,lookY=mDir.y||0;
  X.fillStyle='#fff';
  const eyeY=cid==='wang'?sy-15:sy-13;
  const eyeR=cid==='wang'?3:cid==='intern'?2.5:3.5;
  X.beginPath();X.arc(sx-3+lookX*2,eyeY+lookY*1.5,eyeR,0,PI2);X.fill();
  X.beginPath();X.arc(sx+4+lookX*2,eyeY+lookY*1.5,eyeR,0,PI2);X.fill();
  X.fillStyle='#111';
  X.beginPath();X.arc(sx-3+lookX*3,eyeY+1+lookY*2,eyeR*0.5,0,PI2);X.fill();
  X.beginPath();X.arc(sx+4+lookX*3,eyeY+1+lookY*2,eyeR*0.5,0,PI2);X.fill();
  
  // 社畜眼镜
  if(cid==='slave'){
    X.strokeStyle='#aaa';X.lineWidth=1.5;
    X.beginPath();X.arc(sx-3,eyeY,4.5,0,PI2);X.stroke();
    X.beginPath();X.arc(sx+4,eyeY,4.5,0,PI2);X.stroke();
    X.beginPath();X.moveTo(sx+1,eyeY);X.lineTo(sx,eyeY);X.stroke();
  }
  // 脚（走路动画）
  const walkT=G.time*8;
  const walking=Math.abs(mDir.x)>0.1||Math.abs(mDir.y)>0.1||Math.abs(p.vx||0)>0.1;
  const legOff=walking?Math.sin(walkT)*3:0;
  X.fillStyle=col;
  X.fillRect(sx-6,sy+14,5,4+legOff);
  X.fillRect(sx+1,sy+14,5,4-legOff);
  
  // 无敌闪烁
  if(p.invincible>0&&Math.floor(p.invincible*10)%2===0){
    X.globalAlpha=0.4;X.fillStyle='#fff';
    X.beginPath();X.arc(sx,sy,22,0,PI2);X.fill();X.globalAlpha=1;
  }
  // 护身球
  for(const w of p.weapons){
    if(w.type==='orb'){
      const cnt=2+Math.floor(w.lv/2),r=70+w.lv*8;
      X.fillStyle='#0ff';X.shadowColor='#0ff';X.shadowBlur=12;
      for(let i=0;i<cnt;i++){
        const a=(p.orbAngle||0)+(PI2/cnt)*i;
        X.beginPath();X.arc(p.x+Math.cos(a)*r-cam.x,p.y+Math.sin(a)*r-cam.y,7,0,PI2);X.fill();
      }
      X.shadowBlur=0;
    }
  }
}

function drawEnemy(e){
  if(e.dead)return;
  const sx=e.x-cam.x,sy=e.y-cam.y;
  // 屏幕外跳过
  if(sx<-60||sx>W+60||sy<-60||sy>H+60)return;
  const flash=e.hitFlash>0;
  X.fillStyle=flash?'#fff':e.color;
  // 只有BOSS用shadowBlur，普通怪不开（性能优化）
  const useShadow=e.type==='boss';
  if(useShadow){X.shadowColor=e.color;X.shadowBlur=8}
  
  switch(e.type){
    case 'slime':
      // 史莱姆：椭圆身体+大眼睛
      X.beginPath();X.ellipse(sx,sy+2,e.size,e.size*0.75,0,0,PI2);X.fill();
      if(!flash){X.fillStyle='#fff';X.beginPath();X.arc(sx-4,sy-2,3.5,0,PI2);X.fill();X.beginPath();X.arc(sx+4,sy-2,3.5,0,PI2);X.fill();X.fillStyle='#222';X.beginPath();X.arc(sx-3,sy-1,2,0,PI2);X.fill();X.beginPath();X.arc(sx+5,sy-1,2,0,PI2);X.fill()}
      break;
    case 'bat':
      // 蝙蝠：翅膀上下扇动
      const wingFlap=Math.sin(G.time*12+e.x)*0.4;
      X.beginPath();
      X.moveTo(sx,sy);
      X.quadraticCurveTo(sx-e.size*1.8,sy-e.size*(1+wingFlap),sx-e.size*0.8,sy+e.size*0.3);
      X.quadraticCurveTo(sx-e.size*0.3,sy-e.size*0.2,sx,sy);
      X.fill();
      X.beginPath();
      X.moveTo(sx,sy);
      X.quadraticCurveTo(sx+e.size*1.8,sy-e.size*(1+wingFlap),sx+e.size*0.8,sy+e.size*0.3);
      X.quadraticCurveTo(sx+e.size*0.3,sy-e.size*0.2,sx,sy);
      X.fill();
      if(!flash){X.fillStyle='#f44';X.beginPath();X.arc(sx-3,sy-1,2,0,PI2);X.fill();X.beginPath();X.arc(sx+3,sy-1,2,0,PI2);X.fill()}
      break;
    case 'skeleton':
      // 骷髅：头+肋骨
      X.beginPath();X.arc(sx,sy-4,e.size*0.7,0,PI2);X.fill();
if(!flash){X.fillStyle='#111';X.fillRect(sx-4,sy-6,3,4);X.fillRect(sx+2,sy-6,3,4);X.fillRect(sx-2,sy-1,4,2)}
      X.fillStyle=flash?'#fff':e.color;
      for(let i=0;i<3;i++){X.fillRect(sx-6,sy+4+i*4,12,2)}
      break;
    case 'ogre':
      // 食人魔：大块头+角
      X.beginPath();X.arc(sx,sy,e.size,0,PI2);X.fill();
// 角
      if(!flash){X.fillStyle='#a63';X.beginPath();X.moveTo(sx-8,sy-e.size+2);X.lineTo(sx-14,sy-e.size-10);X.lineTo(sx-3,sy-e.size+2);X.fill();X.beginPath();X.moveTo(sx+8,sy-e.size+2);X.lineTo(sx+14,sy-e.size-10);X.lineTo(sx+3,sy-e.size+2);X.fill()}
      if(!flash){X.fillStyle='#f44';X.beginPath();X.arc(sx-5,sy-3,3,0,PI2);X.fill();X.beginPath();X.arc(sx+5,sy-3,3,0,PI2);X.fill()}
      break;
    case 'ghost':
      // 幽灵：半透明+飘动尾巴
      X.globalAlpha=0.6;
      X.beginPath();X.arc(sx,sy-3,e.size*0.8,PI,0);
      X.lineTo(sx+e.size*0.8,sy+e.size*0.6);
      // 波浪底部
      for(let i=3;i>=-3;i--){X.quadraticCurveTo(sx+i*e.size*0.27,sy+e.size*(0.6+(i%2)*0.3),sx+(i-1)*e.size*0.27,sy+e.size*0.6)}
      X.closePath();X.fill();
      X.globalAlpha=1;
if(!flash){X.fillStyle='#fff';X.beginPath();X.arc(sx-3,sy-4,2.5,0,PI2);X.fill();X.beginPath();X.arc(sx+3,sy-4,2.5,0,PI2);X.fill();X.fillStyle='#228';X.beginPath();X.arc(sx-3,sy-3,1.5,0,PI2);X.fill();X.beginPath();X.arc(sx+3,sy-3,1.5,0,PI2);X.fill()}
      break;
    case 'worm':
      // 蠕虫：分节身体
      for(let i=0;i<4;i++){
        const off=Math.sin(G.time*4+i*0.8)*3;
        X.beginPath();X.arc(sx+off,sy-e.size+i*e.size*0.5,e.size*0.6*(1-i*0.1),0,PI2);X.fill();
      }
if(!flash){X.fillStyle='#fff';X.beginPath();X.arc(sx-2,sy-e.size,2,0,PI2);X.fill();X.beginPath();X.arc(sx+2,sy-e.size,2,0,PI2);X.fill()}
      break;
    case 'acid':
      // 酸液怪：冒泡绿色黏液
      X.beginPath();X.ellipse(sx,sy+1,e.size*1.1,e.size*0.8,0,0,PI2);X.fill();
// 气泡
      if(!flash){const bt=G.time*3;X.fillStyle='rgba(200,255,0,0.6)';for(let i=0;i<3;i++){const bx=sx+Math.sin(bt+i*2)*6,by=sy-Math.abs(Math.sin(bt*1.5+i))*8;X.beginPath();X.arc(bx,by,2+i%2,0,PI2);X.fill()}}
      break;
    case 'tank':
      // 肉盾：方块身体+头盔
      X.fillRect(sx-e.size,sy-e.size,e.size*2,e.size*2);
// 头盔线
      if(!flash){X.strokeStyle='#654';X.lineWidth=2;X.beginPath();X.moveTo(sx-e.size,sy-e.size*0.3);X.lineTo(sx+e.size,sy-e.size*0.3);X.stroke();X.fillStyle='#432';X.fillRect(sx-e.size*0.6,sy-e.size*0.2,e.size*1.2,e.size*0.4)}
      break;
    case 'splitter':
      // 分裂怪：裂纹球
      X.beginPath();X.arc(sx,sy,e.size,0,PI2);X.fill();
if(!flash){X.strokeStyle='rgba(255,255,255,0.5)';X.lineWidth=1.5;X.beginPath();X.moveTo(sx-e.size*0.5,sy-e.size);X.lineTo(sx+e.size*0.2,sy);X.lineTo(sx-e.size*0.3,sy+e.size);X.stroke();X.beginPath();X.moveTo(sx+e.size*0.6,sy-e.size*0.8);X.lineTo(sx,sy+e.size*0.3);X.stroke()}
      break;
    case 'boss':
      // BOSS：大星形+发光环+怒眼
      X.beginPath();
      for(let i=0;i<6;i++){const a1=-PI/2+PI2/6*i,a2=a1+PI2/12;X.lineTo(sx+Math.cos(a1)*e.size,sy+Math.sin(a1)*e.size);X.lineTo(sx+Math.cos(a2)*e.size*0.5,sy+Math.sin(a2)*e.size*0.5)}
      X.closePath();X.fill();
      // 外发光环
      X.globalAlpha=0.3+Math.sin(G.time*4)*0.15;
      X.strokeStyle=e.color;X.lineWidth=3;
      X.beginPath();X.arc(sx,sy,e.size+6,0,PI2);X.stroke();
      X.globalAlpha=1;
// 怒眼
      if(!flash){X.fillStyle='#ff0';X.beginPath();X.arc(sx-8,sy-4,4,0,PI2);X.fill();X.beginPath();X.arc(sx+8,sy-4,4,0,PI2);X.fill();X.fillStyle='#000';X.beginPath();X.arc(sx-8,sy-3,2,0,PI2);X.fill();X.beginPath();X.arc(sx+8,sy-3,2,0,PI2);X.fill()}
      break;
    default:
      X.beginPath();X.arc(sx,sy,e.size,0,PI2);X.fill();
}
// 燃烧效果
  if(e.burning>0){X.globalAlpha=0.5;X.fillStyle='#f80';X.beginPath();X.arc(sx,sy-e.size-5,5,0,PI2);X.fill();X.globalAlpha=1}
  // 减速效果
  if(e.slowTimer>0){X.globalAlpha=0.4;X.fillStyle='#8cf';X.beginPath();X.arc(sx,sy,e.size+3,0,PI2);X.fill();X.globalAlpha=1}
  
  // 血条（非BOSS）
  if(e.type!=='boss'&&e.hp<e.maxHp){
    const bw=e.size*2;
    X.fillStyle='#300';X.fillRect(sx-bw/2,sy-e.size-8,bw,3);
    X.fillStyle='#f44';X.fillRect(sx-bw/2,sy-e.size-8,bw*(e.hp/e.maxHp),3);
  }
}

function drawFx(){
  // 剑气
  for(const f of G.swordFx){
    X.save();X.translate(f.x-cam.x,f.y-cam.y);X.rotate(f.a);
    X.globalAlpha=f.life/f.max*0.6;X.fillStyle='#0f8';
    X.beginPath();X.moveTo(0,0);X.arc(0,0,f.range,-0.45,0.45);X.closePath();X.fill();
    X.globalAlpha=1;X.restore();
  }
  // 闪电
  for(const l of G.lightFx){
    X.strokeStyle='#ff0';X.lineWidth=3;X.shadowColor='#ff0';X.shadowBlur=20;
    X.globalAlpha=l.life/0.25;
    X.beginPath();X.moveTo(l.x-cam.x,l.y-cam.y-120);
    X.lineTo(l.x-cam.x+rnd(-12,12),l.y-cam.y-60);
    X.lineTo(l.x-cam.x+rnd(-12,12),l.y-cam.y);
    X.stroke();X.shadowBlur=0;X.globalAlpha=1;
  }
  // 火焰
  for(const f of G.fireFx){
    X.globalAlpha=f.life/f.max*0.35;X.fillStyle='#f80';
    X.beginPath();X.arc(f.x-cam.x,f.y-cam.y,f.range*(1-f.life/f.max*0.2),0,PI2);X.fill();X.globalAlpha=1;
  }
  // 冰冻
  for(const f of G.iceFx){
    X.globalAlpha=f.life/f.max*0.4;X.strokeStyle='#8cf';X.lineWidth=2;
    X.beginPath();X.arc(f.x-cam.x,f.y-cam.y,f.range*(1-f.life/f.max*0.3),0,PI2);X.stroke();X.globalAlpha=1;
  }
}

function drawDeathTraces(){
  for(const t of deathTraces){
    const sx=t.x-cam.x,sy=t.y-cam.y;
    const alpha=t.life/t.maxLife*0.5;
    X.globalAlpha=alpha;
    X.fillStyle=t.color;
    X.beginPath();X.arc(sx,sy,t.radius,0,PI2);X.fill();
    X.globalAlpha=1;
  }
}

function drawBossBullets(){
  for(const b of bossBullets){
    const sx=b.x-cam.x,sy=b.y-cam.y;
    X.fillStyle=b.color;X.shadowColor=b.color;X.shadowBlur=10;
    X.beginPath();X.arc(sx,sy,b.size,0,PI2);X.fill();
    // 内核亮色
    X.fillStyle='#ff8';X.beginPath();X.arc(sx,sy,b.size*0.4,0,PI2);X.fill();
    X.shadowBlur=0;
  }
}

function drawTraps(){
  for(const t of traps){
    const sx=t.x-cam.x,sy=t.y-cam.y;
    const pulse=0.5+Math.sin(G.time*4+t.pulsePhase)*0.3;
    const alpha=Math.min(1,t.life/2)*0.5;
    // 外圈警告
    X.globalAlpha=alpha*0.4;
    X.strokeStyle='#f22';X.lineWidth=2;
    X.setLineDash([6,4]);
    X.beginPath();X.arc(sx,sy,t.radius,0,PI2);X.stroke();
    X.setLineDash([]);
    // 内圈伤害区
    X.globalAlpha=alpha*pulse*0.35;
    X.fillStyle='#f00';
    X.beginPath();X.arc(sx,sy,t.radius*0.8,0,PI2);X.fill();
    // 中心骷髅标记
    X.globalAlpha=alpha*0.7;
    X.fillStyle='#f44';X.font='bold 16px sans-serif';X.textAlign='center';
    X.fillText('☠',sx,sy+5);
    X.textAlign='left';
    X.globalAlpha=1;
  }
}

function drawBossHP(){
  // 找活着的BOSS
  const boss=enemies.find(e=>e.type==='boss'&&!e.dead);
  if(!boss)return;
  const bw=W*0.6,bh=12,bx=(W-bw)/2,by=30;
  // 背景
  X.fillStyle='rgba(0,0,0,0.6)';X.fillRect(bx-4,by-4,bw+8,bh+8);
  X.strokeStyle='#f44';X.lineWidth=1;X.strokeRect(bx-4,by-4,bw+8,bh+8);
  // 血条
  X.fillStyle='#400';X.fillRect(bx,by,bw,bh);
  X.fillStyle='#f22';X.fillRect(bx,by,bw*(boss.hp/boss.maxHp),bh);
  // 文字
  X.fillStyle='#fff';X.font='bold 11px sans-serif';X.textAlign='center';
  X.fillText(`👹 ${boss.bossName||'BOSS'}  ${Math.ceil(boss.hp)}/${boss.maxHp}`,W/2,by+bh-2);
  X.textAlign='left';
}

function drawGems(){
  for(const g of gems){
    const sx=g.x-cam.x,sy=g.y-cam.y;
    X.fillStyle=g.color;X.shadowColor=g.color;X.shadowBlur=8;
    X.beginPath();
    X.moveTo(sx,sy-g.size);X.lineTo(sx+g.size*0.6,sy);
    X.lineTo(sx,sy+g.size);X.lineTo(sx-g.size*0.6,sy);
    X.closePath();X.fill();X.shadowBlur=0;
  }
}

function drawParticles(){
  for(const p of particles){
    X.globalAlpha=p.life/p.maxLife;X.fillStyle=p.color;
    X.fillRect(p.x-cam.x-p.size/2,p.y-cam.y-p.size/2,p.size,p.size);
  }
  X.globalAlpha=1;
}

function drawDmgTexts(){
  X.textAlign='center';X.font='bold 15px sans-serif';
  for(const d of dmgTexts){
    X.globalAlpha=Math.max(0,d.life/0.7);X.fillStyle=d.color;
    X.strokeStyle='rgba(0,0,0,0.6)';X.lineWidth=3;
    X.strokeText(d.text,d.x-cam.x,d.y-cam.y);
    X.fillText(d.text,d.x-cam.x,d.y-cam.y);
  }
  X.globalAlpha=1;
}

function drawHUD(){
  const p=player;
  // XP条
  const xpW=W,xpH=5;
  X.fillStyle='#222';X.fillRect(0,0,xpW,xpH);
  X.fillStyle='#0f8';X.fillRect(0,0,xpW*(p.xp/p.xpToNext),xpH);
  
  // HUD
  X.textAlign='left';X.font='14px sans-serif';
  const hx=12,hy=22;
  
  // HP条
  X.fillStyle='#333';X.fillRect(hx,hy,130,10);
  X.fillStyle=p.hp/p.maxHp>0.3?'#f44':'#f00';X.fillRect(hx,hy,130*(p.hp/p.maxHp),10);
  X.strokeStyle='#555';X.strokeRect(hx,hy,130,10);
  X.fillStyle='#fff';X.font='10px sans-serif';X.fillText(`${Math.ceil(p.hp)}/${p.maxHp}`,hx+4,hy+9);
  
  // 信息
  X.font='14px sans-serif';X.fillStyle='#fff';
  X.fillText(`⏱ ${fmtTime(G.time)}  💀 ${G.kills}  ⭐ Lv.${p.level}`,hx,hy+26);
  
  // 连击
  if(G.combos>=3){
    X.fillStyle='#ff0';X.font='bold 18px sans-serif';
    X.fillText(`${G.combos} COMBO!`,hx,hy+48);
  }
  
  // 武器信息
  X.font='12px sans-serif';X.fillStyle='#aaa';
  const wi=p.weapons.map(w=>`${WEAPONS[w.type].icon}${WEAPONS[w.type].name}Lv${w.lv}`).join('  ');
  X.fillText(wi,hx,hy+65);
  // 组合技显示
  for(const w of p.weapons){
    if(w.combo){
      X.fillStyle='#ff0';X.font='bold 12px sans-serif';
      X.fillText(`🔗 ${w.combo.name}`,hx,hy+80);
      break;
    }
  }
  
  // 波次
  X.textAlign='right';X.fillStyle='#888';X.font='12px sans-serif';
  X.fillText(`Wave ${G.wave}`,W-12,22);
  
  // Boss警告
  if(G.wave%5===0&&G.waveTimer<3){
    X.textAlign='center';X.fillStyle='#f44';X.font='bold 28px sans-serif';
    X.globalAlpha=0.5+Math.sin(G.time*8)*0.5;
    X.fillText('⚠ BOSS来袭！',W/2,H/2-100);
    X.globalAlpha=1;
  }
  
  X.textAlign='left';
}

function drawUpgradePanel(){
  if(G.state!=='upgrade')return;
  // 半透明遮罩
  X.fillStyle='rgba(0,0,0,0.7)';X.fillRect(0,0,W,H);
  
  X.textAlign='center';X.fillStyle='#ff0';X.font='bold 26px sans-serif';
  X.fillText('⬆ 升级！选择强化',W/2,H/2-120);
  
  const bw=280,bh=60,startY=H/2-60;
  for(let i=0;i<G.upgradeOpts.length;i++){
    const opt=G.upgradeOpts[i];
    const y=startY+i*75;
    // 按钮背景
    X.fillStyle='rgba(0,0,0,0.85)';
    X.strokeStyle='#0f8';X.lineWidth=2;
    X.beginPath();X.roundRect(W/2-bw/2,y,bw,bh,8);X.fill();X.stroke();
    
    X.fillStyle='#0f8';X.font='bold 16px sans-serif';X.textAlign='center';
    X.fillText(opt.name,W/2,y+24);
    X.fillStyle='#aaa';X.font='13px sans-serif';
    X.fillText(opt.desc,W/2,y+44);
  }

  X.fillStyle='#666';X.font='12px sans-serif';
  X.fillText('点击选择（数字键1-3）',W/2,startY+G.upgradeOpts.length*75+20);
  X.textAlign='left';
}

function drawGameOver(){

const charSelectRects=[];
function drawCharSelect(){
  X.fillStyle='rgba(0,0,0,0.85)';X.fillRect(0,0,W,H);
  X.textAlign='center';
  X.fillStyle='#ff0';X.shadowColor='#ff0';X.shadowBlur=10;
  X.font='bold 24px sans-serif';
  X.fillText('🎭 选择角色',W/2,60);
  X.shadowBlur=0;
  
  const chars=Object.values(CHARACTERS);
  const cardH=100,gap=12,startY=100;
  const cardW=Math.min(320,W-40);
  charSelectRects.length=0;
  
  chars.forEach((ch,i)=>{
    const y=startY+i*(cardH+gap);
    const x=W/2-cardW/2;
    charSelectRects.push({x,y,w:cardW,h:cardH,id:ch.id});
    
    // 卡片背景
    X.fillStyle='rgba(255,255,255,0.08)';
    X.strokeStyle='rgba(255,255,255,0.2)';X.lineWidth=1.5;
    X.beginPath();X.roundRect(x,y,cardW,cardH,12);X.fill();X.stroke();
    
    // 角色圆形头像
    X.fillStyle=ch.color;X.shadowColor=ch.color;X.shadowBlur=8;
    X.beginPath();X.arc(x+40,y+cardH/2,22,0,PI2);X.fill();X.shadowBlur=0;
    
    // 角色名+emoji
    X.fillStyle='#fff';X.font='bold 18px sans-serif';X.textAlign='left';
    X.fillText(ch.emoji+' '+ch.name,x+75,y+30);
    
    // 描述
    X.fillStyle='#aaa';X.font='12px sans-serif';
    X.fillText(ch.desc,x+75,y+50);
    
    // 属性
    X.fillStyle='#0f0';X.font='12px sans-serif';
    X.fillText(ch.stats,x+75,y+70);
  });
  
  X.textAlign='center';X.fillStyle='#555';X.font='11px sans-serif';
  X.fillText('点击选择角色',W/2,startY+chars.length*(cardH+gap)+20);
  X.textAlign='left';
}

function fmtTime(s){return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`}

// ==================== 点击处理 ====================
C.addEventListener('click',e=>{
  initAudio();
  if(G.state==='menu'){G.state='charSelect';return}
  if(G.state==='charSelect'){
    const mx=e.clientX,my=e.clientY;
    for(const r of charSelectRects){
      if(mx>=r.x&&mx<=r.x+r.w&&my>=r.y&&my<=r.y+r.h){
        selectedChar=r.id;G.start();return;
      }
    }
    return;
  }
  if(G.state==='gameover'){G.state='menu';return}
  if(G.state==='upgrade'){
    const bw=280,bh=60,startY=H/2-60;
    const mx=e.clientX,my=e.clientY;
    for(let i=0;i<G.upgradeOpts.length;i++){
      const y=startY+i*75;
      if(mx>W/2-bw/2&&mx<W/2+bw/2&&my>y&&my<y+bh){
        G.upgradeOpts[i].apply();G.state='play';return;
      }
    }
  }
});

// 键盘选择升级
addEventListener('keydown',e=>{
  if(G.state==='upgrade'){
    const n=parseInt(e.key);
    if(n>=1&&n<=3&&G.upgradeOpts[n-1]){
      G.upgradeOpts[n-1].apply();G.state='play';
    }
  }
});

// ==================== 主循环 ====================
let last=performance.now();
function loop(now){
  const dt=Math.min(0.05,(now-last)/1000);last=now;
  
  update(dt);
  
  // 渲染
  X.fillStyle='#0a0a1a';X.fillRect(0,0,W,H);
  
  if(G.state==='menu'){drawMenu()}
  else if(G.state==='charSelect'){drawCharSelect()}
  else{
    // 相机震动
    X.save();
    if(cam.shake>0.5)X.translate(rnd(-cam.shake,cam.shake),rnd(-cam.shake,cam.shake));
    
    drawGrid();
    drawDeathTraces();
    drawGems();
    drawTraps();
    for(const e of enemies)drawEnemy(e);
    drawPlayer();
    drawFx();
    drawBossBullets();
    drawParticles();
    drawDmgTexts();
    
    X.restore();
    
    drawHUD();
    drawBossHP();
    drawUpgradePanel();
    drawGameOver();
  }
  
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
